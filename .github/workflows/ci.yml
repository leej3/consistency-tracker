name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run lint and format checks
        run: |
          npm run lint
          npm run format

      - name: Run tests
        run: npm run test

      - name: Run typecheck and build
        run: |
          npm run typecheck
          npm run build
